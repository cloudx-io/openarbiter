name: Docker Build
on:
  workflow_run:
    workflows: ["Go"]
    types: [completed]

jobs:
  enclave:
    # Only run if the Go workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write # for AWS OIDC authentication
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # ratchet:actions/setup-go@v7
        with:
          go-version: "1.26.0"
      - name: Configure AWS credentials
        if: github.event.workflow_run.head_branch == 'main'
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # ratchet:aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-push
          aws-region: us-east-1
      - name: Login to Amazon ECR
        if: github.event.workflow_run.head_branch == 'main'
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # ratchet:aws-actions/amazon-ecr-login@v2
      - name: go build bin/tee-arbiter-enclave
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -a -ldflags '-extldflags "-static"' -tags netgo -o ./bin/tee-arbiter-enclave ./cmd/enclave-server
      - name: docker set build tag env vars
        run: |
          VERSION="0.0.0"
          SHA="$(git rev-parse --short HEAD || echo 'unknown')"
          DIRTY="$(git diff --no-ext-diff --quiet --exit-code HEAD || echo '.dirty')"
          COMMIT="${SHA}${DIRTY}"
          echo "CLOUDX_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "CLOUDX_COMMIT=${COMMIT}" >> $GITHUB_ENV
      - name: docker set metadata
        id: dockermetadata
        # https://github.com/docker/metadata-action
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # ratchet:docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/cloudx-io/openarbiter/enclave-image
          labels: |
            org.opencontainers.image.title=cloudx-io/openarbiter/enclave-image
            org.opencontainers.image.description=CloudX Nitro Enclave for arbitration
            org.opencontainers.image.vendor=cloudx.io
            org.opencontainers.image.source=https://github.com/cloudx-io/openarbiter
          tags: |
            # short sha of the commit
            type=sha,prefix=,suffix=,format=short
            # long sha of the commit
            type=sha,prefix=,suffix=,format=long
            # our version tag, like "0.0.0-commit.ABCDEF01"
            type=raw,value=${{ env.CLOUDX_VERSION }}-commit.${{ env.CLOUDX_COMMIT }}
            # "latest"
            type=raw,value=latest
      # arm64 images are built via QEMU emulation on the amd64 runner.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # ratchet:docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # ratchet:docker/setup-buildx-action@v4
        with:
          platforms: linux/arm64
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # ratchet:docker/build-push-action@v7
        with:
          context: .
          file: enclave-image/Dockerfile
          platforms: linux/arm64
          # Only push on main branch, not on PR branches
          push: ${{ github.event.workflow_run.head_branch == 'main' }}
          sbom: true
          provenance: mode=max
          tags: ${{ steps.dockermetadata.outputs.tags }}
          labels: ${{ steps.dockermetadata.outputs.labels }}
          build-args: |
            ENCLAVE_MAX_WORKERS=50
